<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#163E7E"/>
        <stop offset="0.55" stop-color="#0B2350"/>
        <stop offset="1" stop-color="#06173A"/>
      </linearGradient>
      <radialGradient id="shine" cx="0.3" cy="0.2" r="0.9">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
        <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="100" height="100" rx="22.5" fill="url(#g)"/>
    <rect width="100" height="100" rx="22.5" fill="url(#shine)"/>
    
  <g transform="translate(50 50) scale(0.9) translate(-50 -50)"
     fill="none" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <!-- lower chevron (accent) -->
    <polyline points="28,70 50,48 72,70" stroke="#3D7BFF"/>
    <!-- upper chevron (white) -->
    <polyline points="28,52 50,30 72,52" stroke="#FFFFFF"/>
  </g>
  </svg>