<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 100 100">
    <defs>
      <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
        <stop offset="0" stop-color="#163E7E"/>
        <stop offset="0.55" stop-color="#0B2350"/>
        <stop offset="1" stop-color="#06173A"/>
      </linearGradient>
      <radialGradient id="shine" cx="0.3" cy="0.2" r="0.9">
        <stop offset="0" stop-color="#ffffff" stop-opacity="0.16"/>
        <stop offset="0.55" stop-color="#ffffff" stop-opacity="0"/>
      </radialGradient>
    </defs>
    <rect width="100" height="100" rx="22.5" fill="url(#g)"/>
    <rect width="100" height="100" rx="22.5" fill="url(#shine)"/>
    
  <g transform="translate(50 50) scale(0.9) translate(-50 -50)">
    <!-- ears -->
    <g>
      <ellipse cx="33" cy="33" rx="11" ry="14" fill="#FFFFFF" transform="rotate(-20 33 33)"/>
      <ellipse cx="67" cy="33" rx="11" ry="14" fill="#FFFFFF" transform="rotate(20 67 33)"/>
      <ellipse cx="33" cy="34" rx="5" ry="7.5" fill="#3D7BFF" transform="rotate(-20 33 34)"/>
      <ellipse cx="67" cy="34" rx="5" ry="7.5" fill="#3D7BFF" transform="rotate(20 67 34)"/>
    </g>

    <!-- forehead tuft + head -->
    <path d="M50 21 L44 36 L56 36 Z" fill="#FFFFFF"/>
    <ellipse cx="50" cy="57" rx="33" ry="30" fill="#FFFFFF"/>

    <!-- cheeks -->
    <circle cx="26" cy="64" r="5" fill="#3D7BFF" opacity="0.30"/>
    <circle cx="74" cy="64" r="5" fill="#3D7BFF" opacity="0.30"/>

    <!-- whiskers -->
    <g stroke="#0B2350" stroke-width="1.6" stroke-linecap="round" opacity="0.55">
      <line x1="30" y1="61" x2="16" y2="59"/>
      <line x1="30" y1="65" x2="15" y2="66"/>
      <line x1="70" y1="61" x2="84" y2="59"/>
      <line x1="70" y1="65" x2="85" y2="66"/>
    </g>

    <!-- eyes -->
    <circle cx="38" cy="55" r="5.5" fill="#0B2350"/>
    <circle cx="62" cy="55" r="5.5" fill="#0B2350"/>
    <circle cx="39.8" cy="53.2" r="1.9" fill="#FFFFFF"/>
    <circle cx="63.8" cy="53.2" r="1.9" fill="#FFFFFF"/>

    <!-- nose -->
    <path d="M50 68 C46 68 44 65 44 63 C44 61 47 61 50 62.5 C53 61 56 61 56 63 C56 65 54 68 50 68 Z" fill="#0B2350"/>

    <!-- front teeth -->
    <rect x="46.5" y="69" width="7" height="8" rx="1.6" fill="#FFFFFF" stroke="#0B2350" stroke-width="1.6"/>
    <line x1="50" y1="69.5" x2="50" y2="76.5" stroke="#0B2350" stroke-width="1.4"/>
  </g>
  </svg>